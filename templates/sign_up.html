{% extends "layout.html" %}
{% block head%}

<style>
   .main-container{
      margin:0;
      min-height:70vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial, Helvetica, sans-serif;
      background:#f7f7f7;
   }
   .main{
      text-align: center;
   }
     #signing_container {
        display:flex; 
        justify-content: center; 
        flex-direction:column;
        align-items:center; 
        gap: 10px;
     }
     input{
             text-align: center;
             width: 500px;
             height: 30px;
             font-size: 16px;
             padding: 5px;
             border-radius:12px;
             border-color: black;
             box-shadow: 10px 10px 15px rgba(0, 0, 0, 0.3);

        }
        h1,h2{
         text-align: center;
        }
        a{
         text-decoration: none;
        }
</style>

{% endblock head %}


{% block content %}
{% block nav %} {{super()}} {% endblock nav %}
<div class="main-container">
<div class="main">
<h1>Sign up to organize your tasks intelligently</h1>
<form action="{{ url_for('sign_up') }}" method="POST">
<div id="signing_container">
    <input type="text" name="username" placeholder="User name" required>
    <input type="password" name="password" placeholder="Password" required>
    <input type="password" name="verifypassword" placeholder="Verify Password" required>
    <input type="submit"  value="Submit" >
    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {%endif%}
    <a href="{{ url_for('log_in') }}">Already have an account?</a>
</div>
</form>
</div>
</div>
{%endblock%}
