{% extends "layout.html" %}
{% block head %}

<style>
     #signing_container {
        display:flex; 
        justify-content: center; 
        align-items:center; 
        flex-direction:column; 
        gap: 10px;
     }
      h1,h2{
            text-align:center;
     }
      input{
             text-align: center;
             width: 500px;
             height: 30px;
             font-size: 16px;
             padding: 5px;
             border-radius:12px;
             border-color: black;
             box-shadow: 10px 10px 15px rgba(0, 0, 0, 0.3);

      }
</style>
{% endblock head%}
{% block content%}

{% block nav %} {{super()}} {% endblock nav %}


<h1>Log in to your account</h1>
<form action="{{ url_for('log_in') }}" method="POST">
<div id="signing_container">
    <input type="text" name="username" placeholder="User name" required>
    <input type="password" name="password" placeholder="Password" required>
    <input type="submit" value="Submit">
    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {%endif%}
</div>
</form>

{% endblock content%}
