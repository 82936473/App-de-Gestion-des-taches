{% extends "layout.html" %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static',filename='css/add_task.css') }}">
{% endblock head %}

{% block content %}

<div class="add-task">

    {% block sidebar %} {{ super() }} {% endblock %}

    <main class="content">
             <h1>Edit Task</h1>

        <form class="add-card" action="{{ url_for('edit_task', task_id=task.id) }}" method="POST" id="task-card">

            <label>Task</label>

            <input type="text" name="task" value="{{ task.title }}" required>

            <label>Priority</label>

            <select name="priority" id="priority">

                <option value="High" {% if task.priority=="High" %}selected{% endif %}>🔴 High</option>
                <option value="Medium"{% if task.priority=="Medium" %}selected{% endif %}>🟠 Medium</option>
                <option value="Low" {% if task.priority=="Low" %}selected{% endif %}>🟢 Low</option>

            </select>

            <label>Due date</label>

            <input type="date" name="due_date" value="{{ task.due_date }}">

            <button type="submit">Save Changes</button>

        </form>

    </main>

</div>
<script>

const priority = document.getElementById("priority");
const card = document.getElementById("task-card");

priority.addEventListener("change", function(){

    card.classList.remove("high", "medium", "low");

    if(priority.value === "High"){
        card.classList.add("high");
    }
    else if(priority.value === "Medium"){
        card.classList.add("medium");
    }
    else{
        card.classList.add("low");
    }

});

</script>

{% endblock %}
