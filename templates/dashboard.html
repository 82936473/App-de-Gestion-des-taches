{% extends "layout.html" %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">   
{% endblock head %}
{% block content %}

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">

        <a href="#">🤖 AI Chat</a>

        <a href="#" class="active">📋 Tasks</a>

        <a href="#">ℹ️ About</a>

        <a href="#">🚪 Sign out</a>

    </aside>

    <!-- Contenu principal -->
    <main class="content">

        <h1>Tasks</h1>

        {% for task in tasks %}

        <div class="task-card" id="{{ task[1]|lower }}">

            <div class="card-header">

                <div>

                    <p><strong>Due date:</strong> {{ task[3] }}</p>
                    <p>
                        <strong>Priority:</strong>

                        <span>
                            {{ task[1] }}
                        </span>

                    </p>

                </div>

                <div class="dropdown" id="{{ task[1]|lower }}">

                     <button class="menu">⋮</button>

                    <div class="dropdown-content">
                          <a href="#">✏ Edit</a>
                          <a href="#">🗑 Delete</a>
                          <a href="#">✔ Complete</a>
                     </div>

                </div>

            </div>

            <hr>

            <h2>{{ task[2] }}</h2>

        </div>

        {% endfor %}

    </main>

</div>


<script>
const buttons = document.querySelectorAll(".menu");

buttons.forEach(button => {

    button.addEventListener("click", function (event) {

        // Prevent the click from reaching the document
        event.stopPropagation();

        // Close all other dropdowns
        document.querySelectorAll(".dropdown-content").forEach(menu => {
            if (menu !== this.nextElementSibling) {
                menu.style.display = "none";
            }
        });

        // Toggle this dropdown
        const menu = this.nextElementSibling;

        if (menu.style.display === "block")
            menu.style.display = "none";
        else
            menu.style.display = "block";

    });

});

// Close all dropdowns when clicking anywhere else
document.addEventListener("click", function () {

    document.querySelectorAll(".dropdown-content").forEach(menu => {
        menu.style.display = "none";
    });

});
</script>
{% endblock %}
