{% extends "layout.html" %}
{% block head %}
<style>
    h1,h2{
            text-align:center;
        }
    a{
            display:block;
            text-decoration:none;
            color:#333;
            font-size:20px;
            padding:18px 25px;
            margin:10px;
            border-radius:12px;
            transition:0.2s;
        }
    .hero-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:50px;
    }

    .hero-buttons a{
        text-decoration:none;
        font-size:18px;
        font-weight:600;
        padding:15px 40px;
        border-radius:14px;
        transition:.2s;
    }

    .login-btn{
        color:#6d4aff;
        border:2px solid #6d4aff;
    }

    .login-btn:hover{
        background:#ece8ff;
    }

    .signup-btn{
        background:#6d4aff;
        color:white;
    }

    .signup-btn:hover{
        background:#5a38db;
    }
    </style>
{% endblock head %}
{% block content %}

{% block nav %} {{super()}} {% endblock nav %}

<h1>Horizons AI</h1>
<h2>Organize your tasks intelligently</h2>
<div class="hero-buttons">
     <a class="login-btn" href="{{ url_for('log_in') }}";">Log in&emsp;</a>
     <a class="signup-btn" href="{{ url_for('sign_up') }}">Sign up</a>
</div>


{% endblock content %}
